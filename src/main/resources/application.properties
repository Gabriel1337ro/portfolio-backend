spring.application.name=gabb1337dev
spring.cloud.config.enabled=false
spring.cloud.compatibility-verifier.enabled=false

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/portfolio}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console Configuration (solo en desarrollo)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Server Configuration
server.port=${PORT:8080}

# Security Configuration
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.org.springframework=${LOG_LEVEL:INFO}
logging.level.com.gabb1337dev=${LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL:INFO}
logging.level.com.zaxxer.hikari=${LOG_LEVEL:INFO}

# Render Configuration
spring.main.allow-bean-definition-overriding=true
spring.main.web-application-type=servlet
