services:
  - type: web
    name: portfolio-backend
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: postgres
    plan: free 