services:
  - type: web
    name: portfolio-backend
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/gabb1337dev-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 17.0.0
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: postgres
    plan: free 